---
- name: System Maintenance and Conditional Reboot
  hosts: all
  become: true
  become_user: root
  tasks:
    # --- DEBIAN / UBUNTU SECTION ---
    - name: Update and clean APT packages
      ansible.builtin.apt:
        update_cache: yes
        upgrade: dist
        autoremove: yes    # Removes unused dependency packages
        autoclean: yes     # Cleans the local repository of retrieved package files
      when: ansible_os_family == "Debian"
      register: apt_update_result

    - name: Log updated APT packages
      ansible.builtin.debug:
        var: apt_update_result.stdout_lines
      when: ansible_os_family == "Debian" and apt_update_result.changed

    - name: Check if reboot is required (Debian/Ubuntu)
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      when: ansible_os_family == "Debian"

    - name: Check which packages require a reboot (Debian/Ubuntu)
      ansible.builtin.command: cat /var/run/reboot-required.pkgs
      register: debian_reboot_pkgs
      when: ansible_os_family == "Debian" and reboot_required_file.stat.exists
      changed_when: false

    - name: Log packages requiring reboot (Debian/Ubuntu)
      ansible.builtin.debug:
        msg: "Reboot required by the following packages: {{ debian_reboot_pkgs.stdout_lines }}"
      when: ansible_os_family == "Debian" and reboot_required_file.stat.exists

    # --- RED HAT / CENTOS SECTION ---
    - name: Update and clean DNF packages
      ansible.builtin.dnf:
        name: "*"
        state: latest
        autoremove: yes    # Removes "leaf" packages that are no longer required
      when: ansible_os_family == "RedHat"
      register: dnf_update_result

    - name: Log updated DNF packages
      ansible.builtin.debug:
        var: dnf_update_result.results
      when: ansible_os_family == "RedHat" and dnf_update_result.changed

    - name: Clear DNF cache (Manual clean)
      ansible.builtin.command: dnf clean all
      when: ansible_os_family == "RedHat"
      changed_when: false

    - name: Check if reboot is required (Red Hat)
      ansible.builtin.command: needs-restarting -r
      register: reboot_required_command
      failed_when: false
      changed_when: false
      when: ansible_os_family == "RedHat"

    - name: Log reasons for reboot (Red Hat)
      ansible.builtin.debug:
        msg: "Reboot required. Details: {{ reboot_required_command.stdout_lines }}"
      when: ansible_os_family == "RedHat" and reboot_required_command.rc == 1

    # --- REBOOT SECTION ---
    - name: Reboot the machine if required
      ansible.builtin.reboot:
        msg: "System maintenance complete. Rebooting for updates."
        reboot_timeout: 600
      when: >
        (ansible_os_family == "Debian" and reboot_required_file.stat.exists) or
        (ansible_os_family == "RedHat" and reboot_required_command.rc == 1)
